name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Least privilege: no CI job touches the token or needs write scope.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This driver requires NIGHTLY Rust (asupersync uses #![feature(try_trait_v2)]),
# so every compiling job pins the nightly from rust-toolchain.toml via
# a pinned dtolnay/rust-toolchain action SHA + toolchain input (dated nightlies
# are not valid action @refs). There is no stable MSRV, hence no MSRV job. The
# publish=false PyO3 harness needs Python. Its live reference-suite remains
# operator-run-only, while the pyshim's Rust unit tests run in `pyshim-unit`.
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # --no-deps, not --all-targets: the workspace enables clippy::unwrap_used,
      # which legitimately fires on test code under --all-targets.
      - run: cargo clippy --workspace --exclude oracledb-pyshim --no-deps -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo test --workspace --exclude oracledb-pyshim
      - run: cargo test -p oracledb --features cassette
      - run: cargo test --workspace --exclude oracledb-pyshim --doc

  pyshim-unit:
    name: pyshim Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Match parity_rigor.sh: create a venv, then let maturin build the shim
      # as an extension module. Modern maturin sets PYO3_BUILD_EXTENSION_MODULE
      # for this build only, leaving cargo test free to link libpython.
      - name: Build the pyshim through maturin
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv-pyshim
          .venv-pyshim/bin/python -m pip install --upgrade pip 'maturin>=1.9.4'
          prefix="$(.venv-pyshim/bin/python -c 'import sys; print(sys.prefix)')"
          VIRTUAL_ENV="$prefix" PATH="$prefix/bin:$PATH" \
            .venv-pyshim/bin/python -m maturin develop -m crates/oracledb-pyshim/Cargo.toml
      - name: Run pyshim Rust unit tests
        shell: bash
        run: |
          set -euo pipefail
          python_libdir="$(.venv-pyshim/bin/python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')"
          python_home="$(.venv-pyshim/bin/python -c 'import sys; print(sys.base_prefix)')"
          LD_LIBRARY_PATH="$python_libdir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
            PYTHONHOME="$python_home" \
            PYO3_PYTHON="$PWD/.venv-pyshim/bin/python" \
            cargo test -p oracledb-pyshim --lib

  docs:
    name: cargo doc (builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Not gated with -D warnings: some doc-comments carry intentional
      # `[bracketed]` text and feature-gated intra-doc links that warn under the
      # default-feature doc build (matching oraclemcp's docs job policy).
      - run: cargo doc --workspace --exclude oracledb-pyshim --no-deps

  # Supply-chain / license gate, driven by the committed deny.toml.
  # (cargo-deny is a standalone binary — no Rust toolchain needed.)
  supply-chain:
    name: cargo deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@6385177bd1684e175e09301c9ee3ae18c14a367e # cargo-deny
      - run: cargo deny check

  # Catch workspace version skew / missing-package drift at PR time, not just at
  # tag time. No token, no tag, no main-ancestry — the script validates only that
  # all crates share one version when RELEASE_TAG/RELEASE_REQUIRE_MAIN are unset.
  release-metadata:
    name: release metadata sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - run: bash scripts/release_preflight.sh

  evidence-controls:
    name: evidence control contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Verify checked entry traces and release/evidence contracts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check_evidence_contract.sh
          bash scripts/check_entry_trace_contract.sh --self-test
          bash scripts/check_release_surface_versions.sh
          bash scripts/check_ci_taxonomy.sh

  musl-size-smoke:
    name: musl size gate smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Smoke musl binary-size gate
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          bash scripts/check_musl_size.sh

  # The manifest-driven cargo-fuzz targets are listed in
  # crates/oracledb-protocol/fuzz/targets.toml and live in the standalone
  # crates/oracledb-protocol/fuzz crate (not a workspace member), so nothing
  # else in CI compiles them. This non-blocking job keeps them from bit-rotting.
  # Pinned to the gnu target (cargo-fuzz defaults to musl, which breaks the
  # ASan build).
  fuzz-build:
    name: fuzz targets compile/smoke (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-fuzz
      - name: Build manifest targets and smoke required tier
        working-directory: crates/oracledb-protocol
        shell: bash
        run: |
          set -euo pipefail
          python3 fuzz/scripts/check_targets_manifest.py check
          while IFS= read -r target; do
            cargo fuzz build "$target" --target x86_64-unknown-linux-gnu
          done < <(python3 fuzz/scripts/check_targets_manifest.py list)
          while IFS= read -r target; do
            read -r -a fuzz_flags <<< "$(python3 fuzz/scripts/check_targets_manifest.py flags "$target")"
            cargo fuzz run "$target" --target x86_64-unknown-linux-gnu -- "${fuzz_flags[@]}"
          done < <(python3 fuzz/scripts/check_targets_manifest.py list --tier required)
