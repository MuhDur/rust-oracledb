name: Live (database) tests

# The driver's live tests are #[ignore] (they require an Oracle listener), so the
# standard `required`/`canary` lanes never run them — which let a real regression
# sit undetected (bead bur7). This lane runs them against a real Oracle Free 23ai
# container, SERIALLY (the small single-instance DB is sensitive to parallel load,
# so serial keeps the run deterministic). Earlier "flakes" f0ad (a CLOB-refetched-
# as-LONG status-trailer desync) and 004o (a stranded speculative-fetch wedge) were
# root-caused to real driver bugs, fixed, and now run unconditionally with offline
# regressions guarding them — no tests are skipped here.
#
# Nightly + on-demand, not per-PR: the Oracle container takes a minute+ to start.
#
# Scope note: this runs the DRIVER's own live tests (which self-provision their
# tables and need only the pythontest user). The full python-oracledb conformance
# suite (harness/run.sh) additionally needs a Python venv + the maturin-built
# PyO3 pyshim + the pinned reference checkout; wiring that richer lane is a
# follow-up.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live:
    name: driver live tests (Oracle Free 23ai)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ORACLE_PASSWORD: OracledbTest#2026
      ORACLEDB_CONTAINER_NAME: rust-oracledb-free
      ORACLEDB_HOST_PORT: '1522'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Start Oracle Free 23ai
        id: start_oracle
        continue-on-error: true
        run: bash scripts/container.sh up

      - name: Wait for database ready
        id: wait_ready
        if: ${{ always() && steps.start_oracle.outcome == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if docker logs "$ORACLEDB_CONTAINER_NAME" 2>&1 | grep -qF 'DATABASE IS READY TO USE'; then
              echo "database ready after ~$((i * 5))s"; exit 0
            fi
            sleep 5
          done
          echo "database never became ready" >&2
          docker logs "$ORACLEDB_CONTAINER_NAME" 2>&1 | tail -60 >&2
          exit 1

      - name: Bootstrap test schema (pythontest user + grants)
        id: bootstrap_schema
        if: ${{ always() && steps.start_oracle.outcome == 'success' && steps.wait_ready.outcome == 'success' }}
        continue-on-error: true
        run: bash scripts/bootstrap_live_schema.sh

      - name: Verify connect-trace credentials are distinguishable
        id: verify_credentials
        if: ${{ always() && steps.start_oracle.outcome == 'success' && steps.wait_ready.outcome == 'success' && steps.bootstrap_schema.outcome == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          eval "$(scripts/container.sh env)"
          test "$PYO_TEST_MAIN_USER" != "$PYO_TEST_MAIN_PASSWORD"
          test "$PYO_TEST_SYSTEM_USER" = system
          test -n "$PYO_TEST_SYSTEM_PASSWORD"
          test "$FAILOVER_PORT" = "$ORACLEDB_HOST_PORT"
          test "$FAILOVER_USER" = "$PYO_TEST_MAIN_USER"
          test "$FAILOVER_PASSWORD" = "$PYO_TEST_MAIN_PASSWORD"

      - name: Driver live tests (serial, ignored)
        id: live_tests
        if: ${{ always() && steps.start_oracle.outcome == 'success' && steps.wait_ready.outcome == 'success' && steps.bootstrap_schema.outcome == 'success' && steps.verify_credentials.outcome == 'success' }}
        continue-on-error: true
        run: |
          set -uo pipefail
          eval "$(scripts/container.sh env)"
          # --test-threads=1: the single small DB is sensitive to parallel load.
          # ALL live tests run — including live_typed_roundtrip_matrix_e12 (f0ad)
          # and stranded_prefetch_request_is_drained_before_reuse (004o), whose
          # former flakiness was real driver bugs now fixed (a CLOB-refetched-as-
          # LONG status-trailer desync and a stranded speculative-fetch wedge,
          # each with an offline regression). A real regression must fail the lane.
          # The 2nd attempt only covers a genuine infra transient (container blip).
          # `--tests` scopes the run to test targets (lib unit + integration), so
          # `--include-ignored` un-ignores the live integration tests WITHOUT also
          # forcing the `#[doc] ```ignore` examples (e.g. oracledb-derive) to run;
          # doctests are covered by the offline gate.
          for attempt in 1 2; do
            echo "::group::live test attempt $attempt"
            if cargo test --workspace --exclude oracledb-pyshim --tests -- --include-ignored --test-threads=1; then
              echo "::endgroup::"; echo "live tests passed on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"; echo "attempt $attempt failed; retrying once"
          done
          echo "live tests failed after 2 attempts" >&2
          exit 1

      - name: Classify machine-readable Live observation
        id: observation
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.start_oracle.outcome }}" != success ||
                "${{ steps.wait_ready.outcome }}" != success ||
                "${{ steps.bootstrap_schema.outcome }}" != success ||
                "${{ steps.verify_credentials.outcome }}" != success ]]; then
            observation=infra_skip
          elif [[ "${{ steps.live_tests.outcome }}" == success ]]; then
            observation=green
          else
            observation=red
          fi
          echo "observation=$observation" >> "$GITHUB_OUTPUT"
          echo "Live observation: $observation"

      - name: Restore latest Live gate state
        id: restore_state
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          state_dir="$RUNNER_TEMP/live-gate-state"
          mkdir -p "$state_dir"
          artifact_id="$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=driver-live-gate-state&per_page=100" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id // empty')"
          if [[ -n "$artifact_id" ]]; then
            gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              > "$RUNNER_TEMP/driver-live-gate-state.zip"
            unzip -p "$RUNNER_TEMP/driver-live-gate-state.zip" live-gate-state.json \
              > "$state_dir/previous.json"
            echo "restored Live gate state artifact $artifact_id"
          else
            echo "no prior Live gate state; starting in advisory mode"
          fi

      - name: Advance advisory-to-blocking state machine
        id: advance_state
        if: ${{ always() && steps.restore_state.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          state_dir="$RUNNER_TEMP/live-gate-state"
          python3 scripts/live_gate_state.py self-test
          python3 scripts/live_gate_state.py transition \
            --previous "$state_dir/previous.json" \
            --allow-missing \
            --observation "${{ steps.observation.outputs.observation }}" \
            --output "$state_dir/live-gate-state.json"
          {
            echo "### Live nightly gate state"
            echo
            echo "- Observation: \`${{ steps.observation.outputs.observation }}\`"
            echo "- Mode: \`$(jq -r .mode "$state_dir/live-gate-state.json")\`"
            echo "- Consecutive greens: \`$(jq -r .green_streak "$state_dir/live-gate-state.json")/3\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persist Live gate state
        if: ${{ always() && steps.advance_state.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: driver-live-gate-state
          path: ${{ runner.temp }}/live-gate-state/live-gate-state.json
          if-no-files-found: error

      - name: Enforce automatically re-armed Live gate
        if: ${{ always() }}
        run: >-
          python3 scripts/live_gate_state.py enforce
          --state "$RUNNER_TEMP/live-gate-state/live-gate-state.json"
