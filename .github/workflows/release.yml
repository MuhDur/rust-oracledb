name: Release

# Tag-driven full release, modelled on oraclemcp's proven pipeline. A pushed
# vX.Y.Z tag is the source of truth: it must match the workspace version and be
# contained in origin/main (release_preflight.sh), then the gates run, crates.io
# publishes in dependency order, and the GitHub release is cut with the static
# binary attached. `workflow_dispatch` validates gates/build without publishing.
#
# This driver requires NIGHTLY Rust (asupersync uses #![feature(try_trait_v2)]),
# so every compiling job is pinned to the nightly in rust-toolchain.toml.
#
# Credential safety: the crates.io token lives ONLY as a secret on the
# `crates-io` GitHub Environment (never a repo-wide secret, never in a file); the
# publish job is the only thing that can read it, and publish_crates.sh is
# idempotent + fails loudly if the token is missing for an unpublished version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: release gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          RELEASE_REQUIRE_MAIN: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: bash scripts/release_preflight.sh

      # The PyO3 pyshim (publish=false) needs a Python toolchain + live DB and is
      # excluded from these gates. clippy is --no-deps (not --all-targets): the
      # workspace enables clippy::unwrap_used, which legitimately fires on tests.
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude oracledb-pyshim --no-deps -- -D warnings
      - run: cargo test --workspace --exclude oracledb-pyshim
      - run: cargo test --workspace --exclude oracledb-pyshim --doc
      - run: cargo doc --workspace --exclude oracledb-pyshim --no-deps
      - uses: taiki-e/install-action@6385177bd1684e175e09301c9ee3ae18c14a367e # cargo-deny
      - run: cargo deny check
      # Validate the published tarballs build cleanly before the matrix/publish.
      # --exclude pyshim: cargo package (unlike publish) does not skip
      # publish=false crates, and pyshim's path-deps have no version requirement.
      - run: cargo package --workspace --exclude oracledb-pyshim --locked

  build:
    name: static musl binary
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write       # required for actions/attest-build-provenance
      attestations: write   # required to record the build-provenance attestation
    # ring (rustls' crypto backend) compiles C for musl; cc + the linker must be
    # musl-gcc to produce a fully static-pie binary (verified; mirrors
    # scripts/smoke-static.sh).
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static smoke binary
        run: cargo build --release -p oracledb --example smoke --target x86_64-unknown-linux-musl
      - name: Package
        shell: bash
        run: |
          dist="oracledb-smoke-x86_64-unknown-linux-musl"
          mkdir "$dist"
          cp target/x86_64-unknown-linux-musl/release/examples/smoke "$dist/oracledb-smoke"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          tar czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"
      - name: Generate SBOM + dependency/action inventory
        run: |
          bash scripts/gen_sbom.sh
          ref="${{ github.ref_name }}"
          cp docs/provenance/cyclonedx.json     "oracledb-sbom-cyclonedx-$ref.json"
          cp docs/provenance/dependencies.tsv   "oracledb-dependencies-$ref.tsv"
          cp docs/provenance/github-actions.tsv "oracledb-github-actions-$ref.tsv"
      # Records a signed, verifiable GitHub build-provenance attestation for the
      # static binary (verify later with `gh attestation verify`). TODO: pin @v2
      # to a commit SHA via dependabot before the 1.0.0 final cut.
      - name: Attest build provenance (static binary)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: oracledb-smoke-x86_64-unknown-linux-musl.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oracledb-smoke-musl
          path: |
            oracledb-smoke-*.tar.gz
            oracledb-smoke-*.tar.gz.sha256
            oracledb-sbom-cyclonedx-*.json
            oracledb-dependencies-*.tsv
            oracledb-github-actions-*.tsv
          if-no-files-found: error

  # Publish the workspace to crates.io on a non-pre-release version tag, before
  # the GitHub release exists. publish_crates.sh is idempotent across retries and
  # skips versions already on crates.io.
  publish-crates:
    name: publish to crates.io
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish_crates.sh

  release:
    name: publish GitHub release
    needs: [build, publish-crates]
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/') &&
        needs.build.result == 'success' &&
        (contains(github.ref_name, '-') || needs.publish-crates.result == 'success')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release with checksums
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/oracledb-sbom-cyclonedx-*.json
            artifacts/oracledb-dependencies-*.tsv
            artifacts/oracledb-github-actions-*.tsv
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
