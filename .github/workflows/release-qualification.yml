name: Release Qualification

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "Exact release-candidate commit SHA to qualify."
        required: true
        type: string
      mode:
        description: "Prep warms the exact-SHA cache and tools; strict performs qualification and emits proof."
        required: true
        default: strict
        type: choice
        options:
          - strict
          - prep

permissions:
  contents: read
  actions: write

env:
  CARGO_PUBLIC_API_VERSION: "0.52.0"
  CARGO_HACK_VERSION: "0.6.45"
  CARGO_SEMVER_CHECKS_VERSION: "0.48.0"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.mode }}-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  prepare-release-qualification:
    name: prepare release qualification cache
    if: ${{ inputs.mode == 'prep' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.candidate_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: release-qualification
      - name: Assert exact candidate checkout
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
      - name: Warm dependency and tool caches
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          cargo fetch --locked
          cargo install cargo-hack --version "$CARGO_HACK_VERSION" --locked
          cargo install cargo-public-api --version "$CARGO_PUBLIC_API_VERSION" --locked
          cargo install cargo-semver-checks --version "$CARGO_SEMVER_CHECKS_VERSION" --locked
          cargo check --workspace --exclude oracledb-pyshim --locked
      - uses: taiki-e/install-action@6385177bd1684e175e09301c9ee3ae18c14a367e # cargo-deny
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-fuzz
      - name: Record prep-only result
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          {
            echo "### Release-qualification prep"
            echo
            echo "- Candidate: \`$CANDIDATE_SHA\`"
            echo "- Shared cache: \`release-qualification\`"
            echo "- Result: cache and tools warmed; no qualification proof emitted"
          } >> "$GITHUB_STEP_SUMMARY"

  release-qualification:
    if: ${{ inputs.mode == 'strict' }}
    uses: ./.github/workflows/_quality.yml
    with:
      profile: release-qualification
      budget: release
      candidate_sha: ${{ inputs.candidate_sha }}

  emit-required-proof:
    name: emit exact required proof
    needs: release-qualification
    if: ${{ inputs.mode == 'strict' && needs.release-qualification.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.candidate_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@6385177bd1684e175e09301c9ee3ae18c14a367e # cargo-deny
      - name: Assert exact candidate checkout
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
      - name: Re-run Required graph and emit proof
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: >-
          bash scripts/verify_required_local.sh
          --run-id "release-qualification-$CANDIDATE_SHA"
          --output "$RUNNER_TEMP/required-proof-$CANDIDATE_SHA.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-required-proof-${{ inputs.candidate_sha }}
          path: ${{ runner.temp }}/required-proof-${{ inputs.candidate_sha }}.json
          if-no-files-found: error

  emit-version-matrix:
    name: emit exact version-matrix evidence
    needs: release-qualification
    if: ${{ inputs.mode == 'strict' && needs.release-qualification.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.candidate_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Assert exact candidate checkout
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
      - name: Run complete live matrix and record exact evidence
        run: bash scripts/release_matrix_gate.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-version-matrix-${{ inputs.candidate_sha }}
          path: tests/artifacts/version_matrix/results-${{ inputs.candidate_sha }}.json
          if-no-files-found: error

  report-release-qualification-failure:
    name: report release qualification failure
    needs: release-qualification
    if: ${{ always() && inputs.mode == 'strict' && github.event_name == 'workflow_dispatch' && needs['release-qualification'].result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      PROFILE: release-qualification
      JOB_RESULT: ${{ needs['release-qualification'].result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      SHA: ${{ inputs.candidate_sha }}
      REF_NAME: ${{ github.ref_name }}
      FINGERPRINT: road-quality-failure:release-qualification:${{ inputs.candidate_sha }}
    steps:
      - name: Create or update failure issue
        shell: bash
        run: |
          set -euo pipefail
          title="[CI] release qualification failure for ${SHA}"
          {
            printf "<!-- %s -->\n\n" "$FINGERPRINT"
            printf "Manual release qualification failed.\n\n"
            printf -- "- Workflow: %s\n" "$GITHUB_WORKFLOW"
            printf -- "- Profile: %s\n" "$PROFILE"
            printf -- "- Result: %s\n" "$JOB_RESULT"
            printf -- "- Ref: %s\n" "$REF_NAME"
            printf -- "- Candidate: %s\n" "$SHA"
            printf -- "- Run: %s\n" "$RUN_URL"
            printf -- "- Updated: %s\n" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > body.md
          query="repo:${GITHUB_REPOSITORY} is:issue is:open ${FINGERPRINT} in:body"
          issue_number="$(gh api -X GET search/issues -f q="$query" --jq '.items[0].number // empty')"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" --title "$title" --body-file body.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file body.md
          fi
