name: Release Qualification

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "Exact release-candidate commit SHA to qualify."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  release-qualification:
    uses: ./.github/workflows/_quality.yml
    with:
      profile: release-qualification
      budget: release
      candidate_sha: ${{ inputs.candidate_sha }}

  report-release-qualification-failure:
    name: report release qualification failure
    needs: release-qualification
    if: ${{ always() && github.event_name == 'workflow_dispatch' && needs['release-qualification'].result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      PROFILE: release-qualification
      JOB_RESULT: ${{ needs['release-qualification'].result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      SHA: ${{ inputs.candidate_sha }}
      REF_NAME: ${{ github.ref_name }}
      FINGERPRINT: road-quality-failure:release-qualification:${{ inputs.candidate_sha }}
    steps:
      - name: Create or update failure issue
        shell: bash
        run: |
          set -euo pipefail
          title="[CI] release qualification failure for ${SHA}"
          {
            printf "<!-- %s -->\n\n" "$FINGERPRINT"
            printf "Manual release qualification failed.\n\n"
            printf -- "- Workflow: %s\n" "$GITHUB_WORKFLOW"
            printf -- "- Profile: %s\n" "$PROFILE"
            printf -- "- Result: %s\n" "$JOB_RESULT"
            printf -- "- Ref: %s\n" "$REF_NAME"
            printf -- "- Candidate: %s\n" "$SHA"
            printf -- "- Run: %s\n" "$RUN_URL"
            printf -- "- Updated: %s\n" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > body.md
          query="repo:${GITHUB_REPOSITORY} is:issue is:open ${FINGERPRINT} in:body"
          issue_number="$(gh api -X GET search/issues -f q="$query" --jq '.items[0].number // empty')"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" --title "$title" --body-file body.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file body.md
          fi
