name: Reusable Quality

on:
  workflow_call:
    inputs:
      profile:
        description: "Tier profile: required, canary, soak, or release-qualification."
        required: true
        type: string
      budget:
        description: "Command budget: required, canary, soak, or release."
        required: true
        type: string
      candidate_sha:
        description: "Exact candidate commit for release qualification; empty means the caller SHA."
        required: false
        default: ""
        type: string
      force_failure:
        description: "Deliberately fail a manual evidence run to verify failure reporting."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_PUBLIC_API_VERSION: "0.52.0"
  CARGO_HACK_VERSION: "0.6.45"
  CARGO_SEMVER_CHECKS_VERSION: "0.48.0"

jobs:
  quality:
    name: quality (${{ inputs.profile }}/${{ inputs.budget }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.profile }}" in
            required|canary|soak|release-qualification) ;;
            *) echo "unsupported profile: ${{ inputs.profile }}" >&2; exit 64 ;;
          esac
          case "${{ inputs.budget }}" in
            required|canary|soak|release) ;;
            *) echo "unsupported budget: ${{ inputs.budget }}" >&2; exit 64 ;;
          esac
          if [[ "${{ inputs.profile }}" == "release-qualification" && -z "${{ inputs.candidate_sha }}" ]]; then
            echo "release-qualification requires candidate_sha" >&2
            exit 64
          fi
          if [[ "${{ inputs.profile }}" == "required" && "${{ inputs.force_failure }}" == "true" ]]; then
            echo "required CI cannot use force_failure" >&2
            exit 64
          fi

      - name: Select budget
        id: budget
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.budget }}" in
            required)
              echo "fuzz_seconds=0" >> "$GITHUB_OUTPUT"
              echo "package=false" >> "$GITHUB_OUTPUT"
              ;;
            canary)
              echo "fuzz_seconds=30" >> "$GITHUB_OUTPUT"
              echo "package=false" >> "$GITHUB_OUTPUT"
              ;;
            soak)
              echo "fuzz_seconds=120" >> "$GITHUB_OUTPUT"
              echo "package=false" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "fuzz_seconds=120" >> "$GITHUB_OUTPUT"
              echo "package=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Forced evidence failure
        if: ${{ inputs.force_failure }}
        run: |
          echo "force_failure requested for reporter verification"
          exit 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.candidate_sha != '' && inputs.candidate_sha || github.sha }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.profile == 'canary' && 'nightly' || 'nightly-2026-05-11' }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Show selected target
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD
          rustc --version
          cargo --version

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude oracledb-pyshim --no-deps -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --exclude oracledb-pyshim

      - name: Test cassette replay
        run: cargo test -p oracledb --features cassette

      - name: Test docs
        run: cargo test --workspace --exclude oracledb-pyshim --doc

      - name: Build docs
        run: cargo doc --workspace --exclude oracledb-pyshim --no-deps

      - name: Install stable Rust
        if: ${{ inputs.profile != 'canary' }}
        run: rustup toolchain install stable --profile minimal

      - name: Stable protocol tests
        if: ${{ inputs.profile != 'canary' }}
        run: cargo +stable test -p oracledb-protocol --locked

      - name: Install cargo-hack
        if: ${{ inputs.profile != 'canary' }}
        run: cargo install cargo-hack --version "$CARGO_HACK_VERSION" --locked

      - name: Feature profile matrix
        if: ${{ inputs.profile != 'canary' }}
        shell: bash
        run: |
          set -euo pipefail
          integration_features=chrono,uuid,serde_json,rust_decimal,arrow,soda
          cargo check -p oracledb --locked --no-default-features
          cargo check -p oracledb --locked
          cargo check -p oracledb --locked --all-features
          cargo hack check -p oracledb --locked \
            --feature-powerset --depth 1 \
            --include-features "$integration_features"
          cargo hack test -p oracledb --locked --lib \
            --feature-powerset --depth 1 \
            --include-features "$integration_features"

      - name: Validate release metadata
        run: bash scripts/release_preflight.sh

      - name: Inter-crate version-pin guard test
        run: bash scripts/test_release_preflight_pins.sh

      - name: Install baseline tools
        if: ${{ inputs.profile != 'canary' }}
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install cargo-public-api
        if: ${{ inputs.profile != 'canary' }}
        run: cargo install cargo-public-api --version "$CARGO_PUBLIC_API_VERSION" --locked

      - name: Baseline drift check
        if: ${{ inputs.profile != 'canary' }}
        run: scripts/gen_baseline.sh --check

      - name: API ledger coverage
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/check_api_ledger.sh

      - name: Single public path per type
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/check_single_path.sh

      - name: Async/blocking coverage
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/check_async_blocking_coverage.sh

      - name: Connect-trace secret exclusion
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/check_trace_secret_exclusion.sh

      # reference/ is the clean-room python-oracledb checkout (gitignored, never
      # vendored); pin it at the tag docs/reference-gates.tsv was generated
      # against so both the drift check and the boundary-test coverage check see
      # the identical gate set in a clean CI checkout.
      - name: Pin clean-room reference checkout
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/pin-reference.sh

      - name: Reference version-gate parity coverage
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/extract_reference_gates.sh --check

      - name: Reference version-gate boundary-test coverage
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/extract_reference_gates.sh --check-coverage

      - name: Provenance artifacts drift check (SBOM + dep/action inventory)
        if: ${{ inputs.profile != 'canary' }}
        run: bash scripts/gen_sbom.sh --check

      - name: Standalone packaged-crate build
        if: ${{ inputs.profile == 'release-qualification' }}
        run: bash scripts/check_standalone_package.sh

      - name: Musl binary size gate
        if: ${{ inputs.profile == 'release-qualification' }}
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          set -euo pipefail
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update
          sudo apt-get install -y musl-tools
          bash scripts/check_musl_size.sh

      - name: Install cargo-semver-checks
        if: ${{ inputs.profile != 'canary' }}
        run: cargo install cargo-semver-checks --version "$CARGO_SEMVER_CHECKS_VERSION" --locked

      # BLOCKING since 0.3.0 (road-to-1.0 W2-T1.5): the 0.3.0 public surface is
      # the published SemVer baseline. A breaking change without an appropriate
      # version bump now fails CI. (0.x minor bumps may still break — e.g. the
      # pre-1.0 removal of the 0.3.0-deprecated methods — which semver-checks
      # permits under a 0.x minor bump.)
      - name: SemVer advisory checks
        if: ${{ inputs.profile != 'canary' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo semver-checks check-release -p oracledb-protocol
          cargo semver-checks check-release -p oracledb

      - uses: taiki-e/install-action@6385177bd1684e175e09301c9ee3ae18c14a367e # cargo-deny

      - name: Supply-chain checks
        run: cargo deny check

      - name: Package crates
        if: ${{ steps.budget.outputs.package == 'true' }}
        run: cargo package --workspace --exclude oracledb-pyshim --locked

      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        if: ${{ steps.budget.outputs.fuzz_seconds != '0' }}
        with:
          tool: cargo-fuzz

      - name: Fuzz targets
        if: ${{ steps.budget.outputs.fuzz_seconds != '0' }}
        working-directory: crates/oracledb-protocol
        shell: bash
        run: |
          set -euo pipefail
          cargo fuzz build --target x86_64-unknown-linux-gnu
          while IFS= read -r target; do
            cargo fuzz run "$target" --target x86_64-unknown-linux-gnu -- \
              -max_total_time="${{ steps.budget.outputs.fuzz_seconds }}" \
              -rss_limit_mb=2048 \
              -timeout=10
          done < <(cargo fuzz list)
