  - id: b-rodb-e6-publish-persist
    scope: global
    category: release
    content: "PITFALL - publish-before-persist: do not expose success, consume a
      grant, close a bead, or publish an outward artifact before the durable
      audit or evidence record is persisted and verified. On persistence
      failure, fail closed and retain a retry-safe state."
    source: learned
    type: rule
    isNegative: true
    kind: stack_pattern
    state: draft
