  - id: b-rodb-e6-tracker-proof
    scope: global
    category: tracker
    content: "Tracker discipline: use the checkout-local .beads database, validate
      JSON output and tracker health before mutation, bind closure to landed
      evidence, and never use br update --status open as a claim-release
      shortcut."
