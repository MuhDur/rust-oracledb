  - id: b-rodb-e6-mutant-integrity
    scope: global
    category: testing
    content: "Mutation integrity: cap each mutant, classify OOM and timeout as
      errored rather than caught, cover every required crate or explicit shard,
      and seal mutant count plus covered-file hashes so stale percentages cannot
      certify a changed surface."
