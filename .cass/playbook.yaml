  - id: b-rodb-e6-expensive-oracle
    scope: global
    category: testing
    content: "Expensive-oracle discipline: capture all diagnostics in one live run,
      falsify wire hypotheses offline first, then spend another live Oracle or
      cloud run only on a discriminating test."
