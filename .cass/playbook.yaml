  - id: b-rodb-e6-worktree-target
    scope: global
    category: multi-agent
    content: Use one git worktree and one real-disk CARGO_TARGET_DIR per build-heavy
      agent. Agent Mail reservations coordinate ownership but do not isolate
      half-finished trees or shared Cargo targets. Cap CARGO_BUILD_JOBS and
      serialize expensive full-suite, mutation, fuzz, and benchmark lanes.
    source: learned
