  - id: b-rodb-e6-no-deferral
    scope: global
    category: workflow
    content: Do not defer planned or discovered work on agent initiative. Finish the
      scoped lane, or surface the exact blocker and record unforeseen work in
      the repo-local tracker; deferral and scope changes belong to the operator.
