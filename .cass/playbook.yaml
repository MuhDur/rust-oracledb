  - id: b-rodb-e6-decode-tighten
    scope: global
    category: security
    content: "Fail-closed decode is tighten-only: never panic, over-allocate, or
      recurse without a bound on hostile wire, wallet, or connect-string input;
      never allocate from an attacker-controlled length without proving it fits
      the remaining message buffer."
    source: learned
    type: rule
