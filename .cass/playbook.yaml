bullets:
  - id: b-rodb-e6-quota-death
    scope: global
    category: multi-agent
    content: For rust-oracledb swarms, treat model quota, session limit, context
      headroom, host memory, and build slots as scheduler resources. Size waves
      to remaining capacity, never route release finalization to a near-full
      session, and reconcile every bead when an agent dies silently (retro O5
      quota-death).
    source: learned
    type: rule
    isNegative: true
    kind: stack_pattern
    state: draft
