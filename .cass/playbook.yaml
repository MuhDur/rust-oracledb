  - id: b-rodb-e6-honest-green
    scope: global
    category: testing
    content: Green means honestly green. State lane-by-lane PASS, FAIL, or typed
      SKIP with the exact command, SHA, artifact, and blocker; never summarize a
      mixed or partial matrix as green.
