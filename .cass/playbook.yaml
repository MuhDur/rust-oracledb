  - id: b-rodb-e6-gates-lie
    scope: global
    category: testing
    content: "PITFALL - gates that lie: never derive green from a crash, KeyError,
      timeout, OOM, partial counter, truncated stream, blocked lane, unknown
      lane, or self-skip. Require a typed verdict plus sealed per-job evidence
      at the exact SHA; anything missing or ambiguous is red or an explicit
      typed skip."
    source: learned
    type: rule
    isNegative: true
    kind: stack_pattern
    state: draft
