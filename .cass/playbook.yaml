  - id: b-rodb-e6-fixture-oracle
    scope: global
    category: testing
    content: "PITFALL - self-fulfilling fixtures: a fixture hand-built in the
      already-expected representation cannot validate its decoder or transform.
      Prefer decoder-produced wire fixtures, an independent oracle,
      value-and-type assertions, or a metamorphic comparison against a
      separately implemented path."
    source: learned
    type: rule
    isNegative: true
    kind: stack_pattern
