  - id: b-rodb-e6-ground-first
    scope: global
    category: workflow
    content: Before acting in rust-oracledb, reread AGENTS.md and README.md and verify
      the live repository, tracker, process, and reservation state. Claims must
      come from commands just run, not plausible or stale session summaries.
